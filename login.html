<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in | Defrilex Language Solutions</title>
<meta name="description" content="Log in to your Defrilex Language Solutions account." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="/assets/site.min.css" />
<link rel="stylesheet" href="/assets/marketplace.css" />
<link rel="stylesheet" href="/assets/gtm.css" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
<link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#0b2b8d" />
</head>
<body class="theme-auth">

<div class="auth-video" aria-hidden="true">
 <video class="auth-video-el" autoplay muted loop playsinline preload="auto" poster="/assets/video/auth-poster.jpg">
  <source src="/assets/video/hero1.mp4" type="video/mp4" />
 </video>
 <div class="auth-video-scrim"></div>
</div>

<div class="noise"></div>

<main class="auth-wrap">
 <a href="/" class="auth-logo" data-mag>
  <img src="/defrilex-wordmark.png" alt="Defrilex Language Solutions" width="2697" height="683" />
 </a>

 <div class="auth-card">
  <p class="auth-eyebrow">Sign in</p>
  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-sub">Log in to your Defrilex Language Solutions account.</p>

  <a href="#" class="auth-google" data-mag>
   <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
   <span>Continue with Google</span>
  </a>

  <div class="auth-divider"><span>Or</span></div>

  <form class="auth-form" action="#" method="post" novalidate>
   <div class="field">
    <label for="auth-id">Username or Email</label>
    <input id="auth-id" name="identifier" type="text" placeholder="Username or Email" autocomplete="username" required />
   </div>
   <div class="field">
    <label for="auth-pass">Password</label>
    <div style="position:relative">
     <input id="auth-pass" name="password" type="password" placeholder="Password" autocomplete="current-password" required style="padding-right:3rem" />
     <button type="button" id="passToggle" style="position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:0;padding:.25rem;color:rgba(255,255,255,.42);cursor:pointer;line-height:0;transition:color .2s" aria-label="Show password">
      <svg id="passEye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
     </button>
    </div>
   </div>
   <div class="auth-row">
    <a href="/forgot-password" class="auth-link">Forgot password?</a>
   </div>
   <button type="submit" class="btn-primary" data-mag style="width:100%;justify-content:center"><span>Log in</span></button>
  </form>

  <p class="auth-foot">Don&rsquo;t have an account? <a href="/register">Sign up</a></p>
 </div>

 <p class="auth-legal">&copy; 2026 Defrilex Language Solutions &middot; <a href="/">Back to site</a></p>
</main>

<script src="/assets/site.min.js"></script>
<script>
(function(){
  var inp = document.getElementById('auth-pass');
  var btn = document.getElementById('passToggle');
  var eye = document.getElementById('passEye');
  var eyeOn  = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  var eyeOff = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  btn.addEventListener('click', function(){
    var show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    eye.innerHTML = show ? eyeOff : eyeOn;
    btn.style.color = show ? 'rgba(255,255,255,.9)' : 'rgba(255,255,255,.42)';
  });
})();
</script>
</body>
</html>
