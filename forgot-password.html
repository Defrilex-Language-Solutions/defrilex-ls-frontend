<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password | Defrilex Language Solutions</title>
<meta name="description" content="Reset your Defrilex Language Solutions password." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="/assets/site.min.css" />
<link rel="stylesheet" href="/assets/marketplace.css" />
<link rel="stylesheet" href="/assets/gtm.css" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
<link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#0b2b8d" />
<style>
.auth-icon{width:64px;height:64px;background:rgba(255,255,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:rgba(255,255,255,.85)}
.auth-submit:disabled{opacity:.45;cursor:not-allowed}
</style>
</head>
<body class="theme-auth">

<div class="auth-video" aria-hidden="true">
 <video class="auth-video-el" autoplay muted loop playsinline preload="auto" poster="/assets/video/auth-poster.jpg">
  <source src="/assets/video/hero1.mp4" type="video/mp4" />
 </video>
 <div class="auth-video-scrim"></div>
</div>

<div class="noise"></div>

<main class="auth-wrap">
 <a href="/" class="auth-logo" data-mag>
  <img src="/defrilex-wordmark.png" alt="Defrilex Language Solutions" width="2697" height="683" />
 </a>

 <div class="auth-card">
  <button type="button" class="auth-back" onclick="history.back()">&#8592; Back</button>

  <div class="auth-icon" aria-hidden="true">
   <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
  </div>

  <p class="auth-eyebrow">Account Recovery</p>
  <h1 class="auth-title">Reset Password</h1>
  <p class="auth-sub">Enter the email associated with your account and we&rsquo;ll send a 6-digit code to reset your password.</p>

  <form class="auth-form" id="forgotForm" action="#" method="post" novalidate>
   <div class="field">
    <label for="reset-email">Email address</label>
    <input id="reset-email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
   </div>
   <button type="submit" class="btn-primary auth-submit" id="sendBtn" style="width:100%;justify-content:center;margin-top:8px" disabled>
    <span>Send Code</span>
   </button>
  </form>

  <p class="auth-foot"><a href="/login">Return to Log in</a></p>
 </div>

 <p class="auth-legal">&copy; 2026 Defrilex Language Solutions &middot; <a href="/">Back to site</a></p>
</main>

<script src="/assets/site.min.js"></script>
<script>
(function(){
  var emailInp = document.getElementById('reset-email');
  var sendBtn  = document.getElementById('sendBtn');

  emailInp.addEventListener('input', function(){
    sendBtn.disabled = !emailInp.value.trim();
  });

  document.getElementById('forgotForm').addEventListener('submit', function(e){
    e.preventDefault();
    var email = emailInp.value.trim();
    if (!email) return;
    // In production: POST to /password/email
    window.location.href = '/code-verify?email=' + encodeURIComponent(email);
  });
})();
</script>
</body>
</html>
